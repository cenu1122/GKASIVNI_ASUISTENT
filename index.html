<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<title>Groq Voice Assistant</title>
</head>
<body>

<button id="mic">🎤 Govori</button>
<button id="speak">🔊 Pročitaj</button>

<textarea id="speech"></textarea>
<textarea id="answer"></textarea>

<script>
const GROQ_API_KEY = "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";

const SpeechRecognition =
  window.SpeechRecognition ||
  window.webkitSpeechRecognition;

const recognition = new SpeechRecognition();
recognition.lang = "bs-BA";

const speech = document.getElementById("speech");
const answer = document.getElementById("answer");

document.getElementById("mic").onclick = () => {
  recognition.start();
};

recognition.onresult = async (e) => {
  const text = e.results[0][0].transcript;
  speech.value = text;

  const response = await fetch(
    "https://api.groq.com/openai/v1/chat/completions",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: "llama-3.3-70b-versatile",
        messages: [
          {
            role: "user",
            content: text
          }
        ]
      })
    }
  );

  const data = await response.json();

  answer.value =
    data.choices?.[0]?.message?.content ||
    "Greška pri odgovoru";
};

document.getElementById("speak").onclick = () => {
  const utterance =
    new SpeechSynthesisUtterance(answer.value);

  utterance.lang = "bs-BA";

  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
};
</script>

</body>
</html>
